name: Automate SEO Article Generation EVERY 2 HOURS

on:
  schedule:
    - cron: '0 */2 * * *' # Runs exactly every 2 hours
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Auto-Gen Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git pull origin main || true
          node auto-gen.js
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Automator"
          git config --global user.email "actions@github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Auto-Update: Regenerate Accure Laser SEO Article"
          
          # Retry loop to prevent concurrent workflow push failures
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            if git push origin main; then
              echo "Push successful!"
              exit 0
            fi
            echo "Push failed. Waiting to retry..."
            sleep 10
          done
          echo "Failed to push after 5 attempts."
          exit 1
